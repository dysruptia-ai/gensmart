# GenSmart — Nginx Reverse Proxy Configuration
# SSL certificates managed by Certbot (Let's Encrypt)

# Redirect non-www → www (HTTP)
server {
    listen 80;
    listen [::]:80;
    server_name gensmart.co;
    return 301 https://www.gensmart.co$request_uri;
}

# Redirect HTTP → HTTPS (www + api)
server {
    listen 80;
    listen [::]:80;
    server_name www.gensmart.co api.gensmart.co;
    return 301 https://$host$request_uri;
}

# --- Frontend: www.gensmart.co (Next.js on port 3000) ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.gensmart.co;

    ssl_certificate /etc/letsencrypt/live/gensmart.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gensmart.co/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    client_max_body_size 20M;

    # Cache Next.js static assets
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # WebSocket support
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

# Redirect non-www → www (HTTPS)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name gensmart.co;

    ssl_certificate /etc/letsencrypt/live/gensmart.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gensmart.co/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.gensmart.co$request_uri;
}

# --- API: api.gensmart.co (Express on port 4000) --- NO CHANGES ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.gensmart.co;

    ssl_certificate /etc/letsencrypt/live/gensmart.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gensmart.co/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    client_max_body_size 20M;

    # Socket.IO (WebSocket + long-polling)
    location /socket.io/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # API routes
    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
